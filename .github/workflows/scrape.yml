name: qtfm-podcast
on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: '蜻蜓频道ID'
        required: true
        type: string
      worker_base:
        description: 'Worker地址'
        required: false
        default: 'https://qtfm-podcast.general74110.workers.dev'
        type: string
  repository_dispatch:
    types: [scrape]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "channel_id=${{ github.event.client_payload.channel_id }}" >> $GITHUB_OUTPUT
            echo "worker_base=${{ github.event.client_payload.worker_base || 'https://qtfm-podcast.general74110.workers.dev' }}" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.client_payload.title }}" >> $GITHUB_OUTPUT
          else
            echo "channel_id=${{ github.event.inputs.channel_id }}" >> $GITHUB_OUTPUT
            echo "worker_base=${{ github.event.inputs.worker_base || 'https://qtfm-podcast.general74110.workers.dev' }}" >> $GITHUB_OUTPUT
            echo "title=manual" >> $GITHUB_OUTPUT
          fi

      - name: scrape
        run: node scripts/scrape.js
        env:
          CHANNEL_ID: ${{ steps.params.outputs.channel_id }}
          WORKER_BASE: ${{ steps.params.outputs.worker_base }}
          OUT_DIR: novels

      - name: deploy pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          publish_dir: ./novels
          publish_branch: gh-pages
          force_orphan: true
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: notify
        if: ${{ always() && steps.params.outputs.channel_id != '' }}
        env:
          BOT: ${{ secrets.TG_BOT_TOKEN }}
          CHAT: ${{ secrets.TG_CHAT_ID }}
          CID: ${{ steps.params.outputs.channel_id }}
        run: |
          curl -s "https://api.telegram.org/bot${BOT}/sendMessage" \
            -d "chat_id=${CHAT}&text=Done: channel ${CID}"