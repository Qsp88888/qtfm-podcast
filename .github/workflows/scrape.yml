name: qtfm-podcast
on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: '蜻蜓频道ID'
        required: true
        type: string
      worker_base:
        description: 'Worker地址'
        required: false
        default: 'https://qtfm-podcast.7452323.workers.dev'
        type: string
      action_type:
        description: 'initial | update'
        required: false
        default: 'initial'
        type: string
  repository_dispatch:
    types: [scrape]

concurrency:
  group: scrape-${{ github.event.client_payload.channel_id || github.event.inputs.channel_id }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            CID="${{ github.event.client_payload.channel_id }}"
            WB="${{ github.event.client_payload.worker_base || 'https://qtfm-podcast.7452323.workers.dev' }}"
            TITLE="${{ github.event.client_payload.title }}"
            AT="${{ github.event.client_payload.action_type || 'initial' }}"
          else
            CID="${{ github.event.inputs.channel_id }}"
            WB="${{ github.event.inputs.worker_base || 'https://qtfm-podcast.7452323.workers.dev' }}"
            TITLE="${{ github.event.inputs.title || 'manual' }}"
            AT="${{ github.event.inputs.action_type || 'initial' }}"
          fi
          echo "channel_id=${CID}" >> $GITHUB_OUTPUT
          echo "worker_base=${WB}" >> $GITHUB_OUTPUT
          echo "title=${TITLE}" >> $GITHUB_OUTPUT
          echo "action_type=${AT}" >> $GITHUB_OUTPUT

      - name: scrape
        run: node scripts/scrape.js
        env:
          CHANNEL_ID: ${{ steps.params.outputs.channel_id }}
          WORKER_BASE: ${{ steps.params.outputs.worker_base }}
          OUT_DIR: novels
          NODE_OPTIONS: --max-old-space-size=1024

      - name: deploy pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          publish_dir: ./novels
          publish_branch: gh-pages
          keep_files: true
          user_name: 'qtfm-bot'
          user_email: 'bot@7452323.workers.dev'

      - name: notify worker
        if: ${{ success() && steps.params.outputs.channel_id != '' }}
        env:
          CID: ${{ steps.params.outputs.channel_id }}
          TITLE: ${{ steps.params.outputs.title }}
          WB: ${{ steps.params.outputs.worker_base }}
        run: |
          # 读取scrape输出的元数据，通知Worker
          META=$(cat novels/${CID}.json 2>/dev/null || echo '{}')
          curl -s -X POST "${WB}/notify" \
            -H "Content-Type: application/json" \
            -d "${META}" || true

      - name: notify telegram
        if: ${{ success() && steps.params.outputs.channel_id != '' }}
        env:
          BOT: ${{ secrets.TG_BOT_TOKEN }}
          CHAT: ${{ secrets.TG_CHAT_ID }}
          CID: ${{ steps.params.outputs.channel_id }}
          TITLE: ${{ steps.params.outputs.title }}
        run: |
          IS_COMPLETE=$(cat novels/${CID}.json 2>/dev/null | grep -o '"isComplete":true' || echo "false")
          COUNT=$(cat novels/${CID}.json 2>/dev/null | grep -o '"programs":[0-9]*' | grep -o '[0-9]*' || echo "0")
          STATUS_ICON=$([ "$IS_COMPLETE" = '"isComplete":true' ] && echo "✅" || echo "🔄")
          STATUS_TEXT=$([ "$IS_COMPLETE" = '"isComplete":true' ] && echo "完本" || echo "连载中")
          curl -s "https://api.telegram.org/bot${BOT}/sendMessage" \
            -d "chat_id=${CHAT}" \
            -d "parse_mode=HTML" \
            -d "text=${STATUS_ICON} <b>${TITLE:-${CID}}</b>%0AID: ${CID}%0A集数: ${COUNT}%0A状态: ${STATUS_TEXT}%0A📖 RSS: https://7452323.github.io/qtfm-podcast/${CID}.xml%0A🎧 Worker: https://qtfm-podcast.7452323.workers.dev/${CID}"
